name: Weekly Robotics Job Scan

on:
  schedule:
    # Every Monday at 00:00 UTC = 09:00 KST
    - cron: '0 0 * * 1'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m scraper.run "https://${{ github.repository_owner }}.github.io/robotics-job-tracker/"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json docs/index.html
          git diff --cached --quiet || git commit -m "chore: weekly job scan $(date -u +%Y-%m-%d)"
          git push
